<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — 진주보건대 창업 워크시트</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="config.js?v=2"></script>
  <style>
    body { overflow: auto; }
    html, body { height: auto; }
  </style>
</head>
<body class="admin-body">

<div id="loginWrap">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:12px">📋</div>
    <h2>관리자 로그인</h2>
    <p>진주보건대 창업 워크시트<br>관리자 전용 페이지</p>
    <input type="password" class="login-input" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">로그인</button>
    <p id="loginErr" style="color:#e53935;font-size:13px;margin-top:10px;display:none">비밀번호가 올바르지 않습니다</p>
  </div>
</div>

<div id="adminWrap" style="display:none">
  <header class="admin-header">
    <h1>📋 창업 워크시트 관리</h1>
    <span id="adminInfo"></span>
  </header>

  <div class="admin-main">
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">전체 제출</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statToday">0</div>
        <div class="stat-label">오늘 제출</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statDepts">0</div>
        <div class="stat-label">참여 학과 수</div>
      </div>
    </div>

    <div class="admin-controls">
      <input type="text" id="searchInput" placeholder="이름, 학번, 학과로 검색..." oninput="renderTable()">
      <button class="btn-export" onclick="exportCSV()">CSV 내보내기</button>
      <button class="btn-export" style="background:#1565c0" onclick="loadSubmissions()">새로고침</button>
    </div>

    <div id="tableWrap"></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
